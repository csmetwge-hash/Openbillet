<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenBillet — Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #18181b;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 360px;
    }
    h1 {
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 8px;
    }
    p {
      font-size: 13px;
      color: #71717a;
      line-height: 1.6;
      margin: 0 0 20px;
    }
    button {
      background: #18181b;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>This page isn't available without a connection. Once you're back online, try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
